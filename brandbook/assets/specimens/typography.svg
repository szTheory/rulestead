<svg role="img" xmlns="http://www.w3.org/2000/svg" aria-labelledby="t d" viewBox="0 0 760 580"><title id="t">Rulestead — Typography Specimen</title><desc id="d">Type scale ramp: Sora, Inter, and IBM Plex Mono at each --rs-text-* size with weight and token-name labels.</desc><g aria-hidden="true"><path fill="#ffffff" d="M0 0h760v580H0z"/><text x="24" y="50" fill="#1a2332" font-family="Sora, Inter, ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="700">The quick brown fox jumps</text><text x="24" y="64" fill="#5c6b7a" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="9">--rs-text-2xl · Sora · 700 · --rs-leading-tight</text><text x="24" y="96" fill="#1a2332" font-family="Sora, Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600">Feature Flag Management</text><text x="24" y="110" fill="#5c6b7a" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="9">--rs-text-xl · Sora · 600</text><text x="24" y="138" fill="#1a2332" font-family="Sora, Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="600">Evaluation Rules</text><text x="24" y="152" fill="#5c6b7a" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="9">--rs-text-lg · Sora · 600</text><text x="24" y="178" fill="#1a2332" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="17" font-weight="500">Card title or lead text</text><text x="24" y="192" fill="#5c6b7a" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="9">--rs-text-md · Inter · 500</text><text x="24" y="218" fill="#1a2332" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15" font-weight="400">Body text at base scale — regular paragraph copy</text><text x="24" y="232" fill="#5c6b7a" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="9">--rs-text-base · Inter · 400 · 0.95rem</text><text x="24" y="256" fill="#5c6b7a" font-family="Inter, ui-sans-serif, system-ui