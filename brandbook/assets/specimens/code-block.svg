<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" viewBox="0 0 680 280"><title id="t">Rulestead — Code Block Specimen</title><desc id="d">Code block specimen: Rulestead Elixir API on mineral dark background with IBM Plex Mono syntax coloring.</desc><g aria-hidden="true"><rect width="680" height="280" fill="#10161f" rx="10"/><rect width="680" height="36" fill="#19222e" rx="10"/><path fill="#19222e" d="M0 18h680v18H0z"/><text x="20" y="23" fill="#7a8fa3" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11">feature_flags.ex</text><circle cx="652" cy="18" r="5" fill="#2e3d52"/><circle cx="636" cy="18" r="5" fill="#2e3d52"/><circle cx="620" cy="18" r="5" fill="#2e3d52"/><text x="20" y="65" fill="#a8b9ca" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="12"># Evaluate a feature flag</text><text x="20" y="87" fill="#e8edf3" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="12">{:ok, result} = Rulestead.evaluate(:dark_mode, ctx)</text><text x="20" y="109" fill="#e8edf3" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="12">IO.inspect(result.value)     # =&gt; true</text><text x="20" y="131" fill="#e8edf3" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="12">IO.inspect(result.reason)    # =&gt; &quot;matched rule 3&quot;</text><text x="20" y="175" fill="#a8b9ca" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="12"># Check rollout percentage</text><text x="20" y="197" fill="#e8edf3" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="12">{:ok, pct} = Rulestead.rollout_percentage(:beta, ctx)</text><text x="20" y="219" fill="#e8edf3" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="12">IO.inspect(pct)  # =&gt; 25</text></g></svg>