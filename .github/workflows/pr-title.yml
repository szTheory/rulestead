# Job id contract — stable YAML `jobs:` keys relied on by docs, `act`, and branch protection:
#   validate-pr-title
# `name:` strings evolve freely; `id:` strings are immutable without coordinated docs + branch-protection updates.
name: Validate PR title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-24.04
    steps:
      # amannn/action-semantic-pull-request@v5 with SHA pin keeps the stable required check name.
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            docs
            test
            refactor
            build
            ci
            chore
            style
          requireScope: false
          subjectPattern: '^(?![A-Z]).+$'
          wip: true
