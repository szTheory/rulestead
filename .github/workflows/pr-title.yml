# Job id contract — stable YAML `jobs:` keys relied on by docs, `act`, and branch protection:
#   validate-pr-title
# `name:` strings evolve freely; `id:` strings are immutable without coordinated docs + branch-protection updates.
name: Validate PR title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-24.04
    steps:
      - name: Validate semantic PR title
        run: |
          set -euo pipefail

          title="$(jq -r '.pull_request.title' "${GITHUB_EVENT_PATH}")"
          pattern='^(feat|fix|perf|docs|test|refactor|build|ci|chore|style)(\([^)]+\))?!?: [a-z].+$'

          if [[ ! "${title}" =~ ${pattern} ]]; then
            echo "PR title must be a Conventional Commit title with a lowercase subject." >&2
            echo "Got: ${title}" >&2
            exit 1
          fi
