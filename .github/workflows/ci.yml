# Job id contract — stable YAML `jobs:` keys relied on by docs, `act`, and branch protection:
#   changes, lint, test, integration-placeholder, adopter-contract, openfeature-companion, mounted-proof, release_gate
# `name:` strings evolve freely; `id:` strings are immutable without coordinated docs + branch-protection updates.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual dispatch is required for the release-please PR head ref.
  # GITHUB_TOKEN-driven pushes (release-please bot) do NOT trigger pull_request
  # events on the PR branch the same way a human push does; publish-hex gate-ci-green
  # needs a successful ci.yml run on the tag SHA — dispatch CI on the release PR ref
  # before merge/publish when bot-driven checks are missing.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: read

jobs:
  changes:
    name: Detect docs-only changes
    runs-on: ubuntu-24.04
    outputs:
      docs-only: ${{ steps.docs-only.outputs.value }}
      openfeature-companion: ${{ steps.openfeature-companion.outputs.value }}
      mounted-proof: ${{ steps.mounted-proof.outputs.value }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        # dorny/paths-filter@v3 with SHA pin; docs-only logic stays job-scoped, not workflow-scoped.
        with:
          filters: |
            docs:
              - '**/*.md'
              - '.planning/**'
              - 'prompts/**'
            code:
              - '!**/*.md'
              - '!.planning/**'
              - '!prompts/**'
              - '**'
            openfeature_companion:
              - 'open_feature_rulestead/**'
              - 'scripts/ci/test.sh'
              - '.github/workflows/ci.yml'
              - 'README.md'
              - 'MAINTAINING.md'
              - 'examples/demo/README.md'
            mounted_proof:
              - 'rulestead_admin/**'
              - 'rulestead/**'
              - 'scripts/ci/test.sh'
              - '.github/workflows/ci.yml'
              - 'README.md'
              - 'MAINTAINING.md'
              - 'rulestead_admin/README.md'
      - id: docs-only
        run: |
          if [[ "${{ steps.filter.outputs.docs }}" == "true" && "${{ steps.filter.outputs.code }}" != "true" ]]; then
            echo "value=true" >> "${GITHUB_OUTPUT}"
          else
            echo "value=false" >> "${GITHUB_OUTPUT}"
          fi
      - id: openfeature-companion
        run: |
          if [[ "${{ steps.filter.outputs.openfeature_companion }}" == "true" ]]; then
            echo "value=true" >> "${GITHUB_OUTPUT}"
          else
            echo "value=false" >> "${GITHUB_OUTPUT}"
          fi
      - id: mounted-proof
        run: |
          if [[ "${{ steps.filter.outputs.mounted_proof }}" == "true" ]]; then
            echo "value=true" >> "${GITHUB_OUTPUT}"
          else
            echo "value=false" >> "${GITHUB_OUTPUT}"
          fi

  lint:
    name: lint
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        with:
          version-file: .tool-versions
          version-type: strict
      - name: Cache Mix deps and build
        id: mix-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            rulestead/deps
            rulestead/_build
          key: ${{ runner.os }}-lint-mix-${{ hashFiles('rulestead/mix.lock', '.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-lint-mix-
      - name: Report lint cache hit
        run: |
          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            hit="${{ steps.mix-cache.outputs.cache-hit }}"
            if [[ "$hit" == "true" ]]; then
              echo "Cache: exact hit" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Cache: miss or restore-key (partial) hit" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
      - name: Restore Dialyzer PLT
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: rulestead/priv/plts
          key: ${{ runner.os }}-plt-${{ hashFiles('rulestead/mix.lock', '.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-plt-
      - name: Run lint lane
        run: scripts/ci/lint.sh
      - name: Save Dialyzer PLT
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: rulestead/priv/plts
          key: ${{ runner.os }}-plt-${{ hashFiles('rulestead/mix.lock', '.tool-versions') }}

  test:
    name: test (${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.17.3"
            otp: "26.2.5"
          - elixir: "1.19.2"
            otp: "28.4.3"
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rulestead_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      MATRIX_ELIXIR: ${{ matrix.elixir }}
      MATRIX_OTP: ${{ matrix.otp }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - name: Cache Mix deps and build
        id: mix-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            rulestead/deps
            rulestead/_build/test
            rulestead_admin/deps
            rulestead_admin/_build/test
          key: ${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-mix-
      - name: Report test cache hit
        run: |
          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            hit="${{ steps.mix-cache.outputs.cache-hit }}"
            if [[ "$hit" == "true" ]]; then
              echo "Cache: exact hit" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Cache: miss or restore-key (partial) hit" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
      - name: Run test lane
        run: scripts/ci/test.sh

  integration-placeholder:
    name: integration (FleetDesk adoption lab)
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Run FleetDesk adoption lab (compose + Playwright)
        run: scripts/ci/integration_placeholder.sh

  adopter-contract:
    name: adopter contract (post-GA band)
    needs: changes
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rulestead_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        with:
          version-file: .tool-versions
          version-type: strict
      - name: Cache Mix deps and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            rulestead/deps
            rulestead/_build/test
            rulestead_admin/deps
            rulestead_admin/_build/test
          key: ${{ runner.os }}-adopter-mix-${{ hashFiles('**/mix.lock', '.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-adopter-mix-
      - name: Run post-GA band closure proof bar
        run: RULESTEAD_TEST_SCOPE=post_ga_band_closure scripts/ci/test.sh

  openfeature-companion:
    name: openfeature companion proof
    needs: changes
    if: needs.changes.outputs.openfeature-companion == 'true'
    runs-on: ubuntu-24.04
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        with:
          version-file: .tool-versions
          version-type: strict
      - name: Cache Mix deps and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            open_feature_rulestead/deps
            open_feature_rulestead/_build/test
          key: ${{ runner.os }}-openfeature-mix-${{ hashFiles('open_feature_rulestead/mix.lock', '.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-openfeature-mix-
      - name: Run OpenFeature companion proof bar
        run: RULESTEAD_TEST_SCOPE=openfeature_companion scripts/ci/test.sh

  mounted-proof:
    name: mounted companion proof
    needs: changes
    if: needs.changes.outputs.mounted-proof == 'true'
    runs-on: ubuntu-24.04
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        with:
          version-file: .tool-versions
          version-type: strict
      - name: Cache Mix deps and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            rulestead/deps
            rulestead/_build/test
            rulestead_admin/deps
            rulestead_admin/_build/test
          key: ${{ runner.os }}-mounted-mix-${{ hashFiles('**/mix.lock', '.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-mounted-mix-
      - name: Install mounted proof deps
        run: |
          cd rulestead && mix deps.get
          cd ../rulestead_admin && mix deps.get
      - name: Run mounted companion proof bar
        run: RULESTEAD_TEST_SCOPE=mounted_admin_contract scripts/ci/test.sh

  release_gate:
    name: release_gate
    needs:
      - changes
      - lint
      - test
      - integration-placeholder
      - adopter-contract
      - mounted-proof
      - openfeature-companion
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Evaluate gate
        run: |
          lint_result="${{ needs.lint.result }}"
          test_result="${{ needs.test.result }}"
          integration_result="${{ needs['integration-placeholder'].result }}"
          adopter_result="${{ needs['adopter-contract'].result }}"
          mounted_proof_result="${{ needs['mounted-proof'].result }}"
          openfeature_result="${{ needs['openfeature-companion'].result }}"

          if [[ "${{ needs.changes.outputs.docs-only }}" == "true" ]]; then
            [[ "${lint_result}" == "skipped" ]] && lint_result="success"
            [[ "${test_result}" == "skipped" ]] && test_result="success"
            [[ "${integration_result}" == "skipped" ]] && integration_result="success"
          fi

          if [[ "${{ needs.changes.outputs.mounted-proof }}" != "true" && "${mounted_proof_result}" == "skipped" ]]; then
            mounted_proof_result="success"
          fi

          if [[ "${{ needs.changes.outputs.openfeature-companion }}" != "true" && "${openfeature_result}" == "skipped" ]]; then
            openfeature_result="success"
          fi

          scripts/ci/release_gate.sh \
            --skip-phase7 \
            "changes=${{ needs.changes.result }}" \
            "lint=${lint_result}" \
            "test=${test_result}" \
            "integration-placeholder=${integration_result}" \
            "adopter-contract=${adopter_result}" \
            "mounted-proof=${mounted_proof_result}" \
            "openfeature-companion=${openfeature_result}"
