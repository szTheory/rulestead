# Job id contract — stable YAML `jobs:` keys relied on by docs, `act`, and branch protection:
#   changes, lint, test, integration-placeholder, release_gate
# `name:` strings evolve freely; `id:` strings are immutable without coordinated docs + branch-protection updates.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: read

jobs:
  changes:
    name: Detect docs-only changes
    runs-on: ubuntu-24.04
    outputs:
      docs-only: ${{ steps.docs-only.outputs.value }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        # dorny/paths-filter@v3 with SHA pin; docs-only logic stays job-scoped, not workflow-scoped.
        with:
          filters: |
            docs:
              - '**/*.md'
              - '.planning/**'
              - 'prompts/**'
            code:
              - '!**/*.md'
              - '!.planning/**'
              - '!prompts/**'
              - '**'
      - id: docs-only
        run: |
          if [[ "${{ steps.filter.outputs.docs }}" == "true" && "${{ steps.filter.outputs.code }}" != "true" ]]; then
            echo "value=true" >> "${GITHUB_OUTPUT}"
          else
            echo "value=false" >> "${GITHUB_OUTPUT}"
          fi

  lint:
    name: lint
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        with:
          version-file: .tool-versions
          version-type: strict
      - name: Run lint lane
        run: scripts/ci/lint.sh

  test:
    name: test (${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.17.3"
            otp: "26.2.5"
          - elixir: "1.19.2"
            otp: "28.4.3"
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rulestead_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      MATRIX_ELIXIR: ${{ matrix.elixir }}
      MATRIX_OTP: ${{ matrix.otp }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - name: Run test lane
        run: scripts/ci/test.sh

  integration-placeholder:
    name: integration-placeholder
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Phase 1 integration placeholder
        run: scripts/ci/integration_placeholder.sh

  release_gate:
    name: release_gate
    needs:
      - changes
      - lint
      - test
      - integration-placeholder
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Evaluate gate
        run: |
          lint_result="${{ needs.lint.result }}"
          test_result="${{ needs.test.result }}"
          integration_result="${{ needs['integration-placeholder'].result }}"

          if [[ "${{ needs.changes.outputs.docs-only }}" == "true" ]]; then
            [[ "${lint_result}" == "skipped" ]] && lint_result="success"
            [[ "${test_result}" == "skipped" ]] && test_result="success"
            [[ "${integration_result}" == "skipped" ]] && integration_result="success"
          fi

          scripts/ci/release_gate.sh \
            --skip-phase7 \
            "changes=${{ needs.changes.result }}" \
            "lint=${lint_result}" \
            "test=${test_result}" \
            "integration-placeholder=${integration_result}"
