# Job id contract — stable YAML `jobs:` keys relied on by docs, `act`, and branch protection:
#   publish-core, publish-admin
# `name:` strings evolve freely; `id:` strings are immutable without coordinated docs + branch-protection updates.
name: publish-hex

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish from
        required: true
        type: string
      release_version:
        description: Release version that must match @version
        required: true
        type: string
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - rulestead
          - rulestead_admin

permissions:
  contents: read

jobs:
  publish-core:
    name: publish-core
    if: inputs.package == 'rulestead'
    runs-on: ubuntu-24.04
    env:
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        with:
          version-file: .tool-versions
          version-type: strict
      - name: Verify package whitelists
        run: scripts/ci/check_package_whitelist.sh
      - name: Verify version matches release
        working-directory: rulestead
        run: grep -n "@version \"${{ inputs.release_version }}\"" mix.exs
      - name: Dry-run publish
        working-directory: rulestead
        run: mix hex.publish --dry-run
      - name: Publish core package
        working-directory: rulestead
        run: mix hex.publish --yes

  publish-admin:
    name: publish-admin
    if: inputs.package == 'rulestead_admin'
    runs-on: ubuntu-24.04
    env:
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
      RULESTEAD_ADMIN_HEX_RELEASE: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        with:
          version-file: .tool-versions
          version-type: strict
      - name: Guard admin publish
        run: scripts/ci/admin_publish_guard.sh
      - name: Verify package whitelists
        run: scripts/ci/check_package_whitelist.sh
      - name: Verify version matches release
        working-directory: rulestead_admin
        run: grep -n "@version \"${{ inputs.release_version }}\"" mix.exs
      - name: Dry-run publish
        working-directory: rulestead_admin
        run: mix hex.publish --dry-run
      - name: Publish admin package
        working-directory: rulestead_admin
        run: mix hex.publish --yes
