# Job id contract — stable YAML `jobs:` keys relied on by docs, `act`, and branch protection:
#   preflight, gate-ci-green, approval, publish-core, publish-admin, handoff-post-publish
# `name:` strings evolve freely; `id:` strings are immutable without coordinated docs + branch-protection updates.
name: publish-hex

on:
  workflow_dispatch:
    inputs:
      core_tag:
        description: Git tag for the `rulestead` package publish
        required: true
        type: string
      admin_tag:
        description: Git tag for the `rulestead_admin` package publish
        required: true
        type: string
      release_version:
        description: Release version that must match both sibling packages
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.core_tag }}
          fetch-depth: 0
      - uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        with:
          version-file: .tool-versions
          version-type: strict
      - name: Guard admin publish structure
        run: scripts/ci/admin_publish_guard.sh
      - name: Verify package whitelists
        run: scripts/ci/check_package_whitelist.sh
      - name: Verify linked release versions
        run: |
          grep -n "@version \"${{ inputs.release_version }}\"" rulestead/mix.exs
          grep -n "@version \"${{ inputs.release_version }}\"" rulestead_admin/mix.exs
      - name: Re-run Phase 7 sibling-package admin slice
        run: |
          cd rulestead_admin
          mix deps.get
          mix test \
            test/rulestead_admin/router_test.exs \
            test/rulestead_admin/live/session_test.exs \
            test/rulestead_admin/live/flag_live/simulate_test.exs \
            test/rulestead_admin/live/flag_live/rollouts_test.exs \
            test/rulestead_admin/live/flag_live/kill_test.exs \
            test/rulestead_admin/live/flag_live/timeline_test.exs \
            test/rulestead_admin/live/audit_live/index_test.exs \
            test/rulestead_admin/live/flag_live/simulate_accessibility_test.exs \
            test/rulestead_admin/live/flag_live/rollouts_accessibility_test.exs \
            test/rulestead_admin/live/flag_live/phase7_accessibility_test.exs

  gate-ci-green:
    name: gate-ci-green
    needs: preflight
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve tagged SHA
        id: resolve-sha
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const ref = '${{ inputs.core_tag }}';
            const commit = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref
            });
            core.setOutput('sha', commit.data.sha);
      - name: Verify CI is green on tagged SHA
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const sha = '${{ steps.resolve-sha.outputs.sha }}';
            const {data} = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              head_sha: sha,
              per_page: 10
            });

            if (data.total_count === 0) {
              core.setFailed(
                `Delivery blocked: no ci.yml runs found for SHA ${sha} (tag ${{ inputs.core_tag }}). ` +
                'Push the tagged commit and let CI complete, or workflow_dispatch ci.yml on that ref before publishing.'
              );
              return;
            }

            const latest = data.workflow_runs[0];

            if (latest.conclusion === 'success') {
              return;
            }

            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: latest.id,
                per_page: 100
              }
            );

            const blockingFailures = jobs.filter(
              (j) => j.conclusion !== 'success' && j.conclusion !== 'skipped'
            );

            if (blockingFailures.length > 0) {
              const detail = blockingFailures
                .map((j) => `  - ${j.name} (${j.conclusion})`)
                .join('\n');
              core.setFailed(
                `Delivery blocked: ci.yml on SHA ${sha} is not green.\n${detail}\nRun: ${latest.html_url}`
              );
            }

  approval:
    name: approval
    needs:
      - preflight
      - gate-ci-green
    runs-on: ubuntu-24.04
    environment:
      name: hex-publish
    steps:
      - name: Await maintainer approval
        run: |
          echo "Approval granted for ${GITHUB_WORKFLOW} ${GITHUB_RUN_ID}"
          echo "Publishing rulestead before rulestead_admin for version ${{ inputs.release_version }}"

  publish-core:
    name: publish-core
    needs:
      - preflight
      - gate-ci-green
      - approval
    runs-on: ubuntu-24.04
    env:
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.core_tag }}
          fetch-depth: 0
      - uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        with:
          version-file: .tool-versions
          version-type: strict
      - name: Verify version matches release
        working-directory: rulestead
        run: grep -n "@version \"${{ inputs.release_version }}\"" mix.exs
      - name: Dry-run publish
        working-directory: rulestead
        run: mix hex.publish --dry-run
      - name: Publish core package
        working-directory: rulestead
        run: mix hex.publish --yes

  publish-admin:
    name: publish-admin
    needs:
      - preflight
      - gate-ci-green
      - publish-core
    runs-on: ubuntu-24.04
    env:
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
      RULESTEAD_ADMIN_HEX_RELEASE: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.admin_tag }}
          fetch-depth: 0
      - uses: erlef/setup-beam@8251c48667b97e88a0a24ec512f5b72a039fcea7 # v1
        with:
          version-file: .tool-versions
          version-type: strict
      - name: Guard admin publish
        run: scripts/ci/admin_publish_guard.sh
      - name: Verify version matches release
        working-directory: rulestead_admin
        run: grep -n "@version \"${{ inputs.release_version }}\"" mix.exs
      - name: Dry-run publish
        working-directory: rulestead_admin
        run: mix hex.publish --dry-run
      - name: Publish admin package
        working-directory: rulestead_admin
        run: mix hex.publish --yes

  handoff-post-publish:
    name: handoff-post-publish
    needs: publish-admin
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: write
    steps:
      - name: Queue post-publish verification workflow
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const version = '${{ inputs.release_version }}';
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'verify-published-release.yml',
              ref: 'main',
              inputs: {
                release_version: version
              }
            });
            core.info(`Queued verify-published-release.yml for version ${version}`);
      - name: Post-publish verification reminder
        run: |
          echo "Hex publish completed for version ${{ inputs.release_version }}."
          echo "verify-published-release.yml was dispatched on main."
          echo "Local fallback:"
          echo "  bash scripts/ci/verify_published_release.sh ${{ inputs.release_version }}"
