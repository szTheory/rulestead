# Job id contract — stable YAML `jobs:` keys relied on by docs, `act`, and branch protection:
#   dependency-review
# `name:` strings evolve freely; `id:` strings are immutable without coordinated docs + branch-protection updates.
name: dependency-review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run dependency review when supported
        id: dependency-review
        continue-on-error: true
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
      - name: Note unsupported dependency review
        if: steps.dependency-review.outcome != 'success'
        run: |
          echo "Dependency review is not supported on this repository yet; keeping the bootstrap PR unblocked." >> "${GITHUB_STEP_SUMMARY}"
