# Job id contract — stable YAML `jobs:` keys relied on by docs, `act`, and branch protection:
#   actionlint
# `name:` strings evolve freely; `id:` strings are immutable without coordinated docs + branch-protection updates.
name: actionlint

on:
  pull_request:
    paths:
      - '.github/workflows/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          reporter: github-pr-review
          fail_level: error
