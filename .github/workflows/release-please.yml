# Job id contract — stable YAML `jobs:` keys relied on by docs, `act`, and branch protection:
#   release-please
# `name:` strings evolve freely; `id:` strings are immutable without coordinated docs + branch-protection updates.
name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-24.04
    outputs:
      rulestead_release_created: ${{ steps.release.outputs.rulestead--release_created }}
      rulestead_admin_release_created: ${{ steps.lockstep.outputs.rulestead_admin_release_created }}
      release_version: ${{ steps.lockstep.outputs.release_version }}
      rulestead_tag_name: ${{ steps.lockstep.outputs.rulestead_tag_name }}
      rulestead_admin_tag_name: ${{ steps.lockstep.outputs.rulestead_admin_tag_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: release
        uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - id: lockstep
        env:
          RULESTEAD_RELEASE_CREATED: ${{ steps.release.outputs.rulestead--release_created }}
          RULESTEAD_ADMIN_RELEASE_CREATED: ${{ steps.release.outputs.rulestead_admin--release_created }}
          RULESTEAD_TAG_NAME: ${{ steps.release.outputs.rulestead--tag_name }}
          RULESTEAD_ADMIN_TAG_NAME: ${{ steps.release.outputs.rulestead_admin--tag_name }}
        run: |
          set -euo pipefail

          admin_release_created="${RULESTEAD_ADMIN_RELEASE_CREATED:-false}"
          rulestead_tag_name="${RULESTEAD_TAG_NAME:-}"
          rulestead_admin_tag_name="${RULESTEAD_ADMIN_TAG_NAME:-}"
          release_version=""

          if [[ "${RULESTEAD_RELEASE_CREATED:-false}" == "true" && "${admin_release_created}" != "true" ]]; then
            core_version="$(jq -r '.rulestead' .release-please-manifest.json)"
            admin_version="$(jq -r '.rulestead_admin' .release-please-manifest.json)"

            if [[ "${core_version}" == "${admin_version}" ]]; then
              admin_release_created="true"
            fi
          fi

          if [[ -n "${rulestead_tag_name}" ]]; then
            release_version="${rulestead_tag_name#rulestead-v}"
          fi

          if [[ -z "${rulestead_tag_name}" && -n "${release_version}" ]]; then
            rulestead_tag_name="rulestead-v${release_version}"
          fi

          if [[ -z "${rulestead_admin_tag_name}" && -n "${release_version}" ]]; then
            rulestead_admin_tag_name="rulestead_admin-v${release_version}"
          fi

          {
            echo "rulestead_admin_release_created=${admin_release_created}"
            echo "release_version=${release_version}"
            echo "rulestead_tag_name=${rulestead_tag_name}"
            echo "rulestead_admin_tag_name=${rulestead_admin_tag_name}"
          } >> "${GITHUB_OUTPUT}"
      - name: Phase 1 bootstrap reminder
        run: |
          echo "Bootstrap the first linked-versions release PR with a commit footer:"
          echo "Release-As: 0.1.0"

  dispatch-release-pr-ci:
    name: dispatch-release-pr-ci
    needs: release-please
    if: needs.release-please.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Dispatch CI on release-please branch
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          branch="release-please--branches--main"

          if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${branch}" >/dev/null 2>&1; then
            echo "No ${branch} ref — skipping CI dispatch."
            exit 0
          fi

          gh workflow run ci.yml --ref "${branch}"
          echo "Dispatched ci.yml on ${branch}."

  dispatch-publish:
    name: dispatch-publish
    needs: release-please
    if: needs.release-please.outputs.rulestead_release_created == 'true' && needs.release-please.outputs.rulestead_admin_release_created == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Queue gated Hex publish
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.release_version }}
          RULESTEAD_TAG_NAME: ${{ needs.release-please.outputs.rulestead_tag_name }}
          RULESTEAD_ADMIN_TAG_NAME: ${{ needs.release-please.outputs.rulestead_admin_tag_name }}
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_VERSION}" || -z "${RULESTEAD_TAG_NAME}" || -z "${RULESTEAD_ADMIN_TAG_NAME}" ]]; then
            echo "release-please did not expose the linked tag metadata needed for publish dispatch" >&2
            exit 1
          fi

          jq -n \
            --arg ref "main" \
            --arg core_tag "${RULESTEAD_TAG_NAME}" \
            --arg admin_tag "${RULESTEAD_ADMIN_TAG_NAME}" \
            --arg release_version "${RELEASE_VERSION}" \
            '{
              ref: $ref,
              inputs: {
                core_tag: $core_tag,
                admin_tag: $admin_tag,
                release_version: $release_version
              }
            }' \
            | curl --fail --silent --show-error \
                -X POST \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/publish-hex.yml/dispatches" \
                -d @-
