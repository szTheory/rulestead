# Job id contract — stable YAML `jobs:` keys relied on by docs, `act`, and branch protection:
#   release-please
# `name:` strings evolve freely; `id:` strings are immutable without coordinated docs + branch-protection updates.
name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-24.04
    outputs:
      rulestead_release_created: ${{ steps.release.outputs.rulestead--release_created }}
      rulestead_admin_release_created: ${{ steps.lockstep.outputs.rulestead_admin_release_created }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: release
        uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - id: lockstep
        env:
          RULESTEAD_RELEASE_CREATED: ${{ steps.release.outputs.rulestead--release_created }}
          RULESTEAD_ADMIN_RELEASE_CREATED: ${{ steps.release.outputs.rulestead_admin--release_created }}
          RULESTEAD_TAG_NAME: ${{ steps.release.outputs.rulestead--tag_name }}
          RULESTEAD_ADMIN_TAG_NAME: ${{ steps.release.outputs.rulestead_admin--tag_name }}
        run: |
          set -euo pipefail

          admin_release_created="${RULESTEAD_ADMIN_RELEASE_CREATED:-false}"

          if [[ "${RULESTEAD_RELEASE_CREATED:-false}" == "true" && "${admin_release_created}" != "true" ]]; then
            core_version="$(jq -r '.rulestead' .release-please-manifest.json)"
            admin_version="$(jq -r '.rulestead_admin' .release-please-manifest.json)"

            if [[ "${core_version}" == "${admin_version}" ]]; then
              admin_release_created="true"
            fi
          fi

          {
            echo "rulestead_admin_release_created=${admin_release_created}"
            echo "rulestead_tag_name=${RULESTEAD_TAG_NAME:-}"
            echo "rulestead_admin_tag_name=${RULESTEAD_ADMIN_TAG_NAME:-}"
          } >> "${GITHUB_OUTPUT}"
      - name: Phase 1 bootstrap reminder
        run: |
          echo "Bootstrap the first linked-versions release PR with a commit footer:"
          echo "Release-As: 0.1.0"
