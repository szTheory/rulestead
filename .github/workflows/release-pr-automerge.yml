# Merge Release Please PRs after release_gate succeeds on the release branch.
# With RELEASE_PLEASE_TOKEN, pull_request CI runs natively; release-pr-ci.yml
# workflow_dispatch-dispatches when an open Release PR was not freshly updated.

name: release-pr-automerge

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
  workflow_dispatch:
    inputs:
      head_sha:
        description: 'Optional PR head SHA to merge (defaults to open release PR head)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  automerge:
    name: Merge release PR
    runs-on: ubuntu-24.04
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'release-please--'))
    steps:
      - name: Resolve target SHA and branch
        id: target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_SHA: ${{ github.event.inputs.head_sha }}
          RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${INPUT_SHA:-}" ]; then
              echo "sha=${INPUT_SHA}" >> "$GITHUB_OUTPUT"
              echo "branch=release-please--branches--main" >> "$GITHUB_OUTPUT"
            else
              pr_json=$(gh pr list \
                --head release-please--branches--main \
                --state open \
                --label "autorelease: pending" \
                --json headRefOid \
                -R "${{ github.repository }}")
              head_oid=$(echo "$pr_json" | jq -r '.[0].headRefOid // empty')
              if [ -z "$head_oid" ]; then
                echo "No open release PR to merge." >&2
                exit 1
              fi
              echo "sha=${head_oid}" >> "$GITHUB_OUTPUT"
              echo "branch=release-please--branches--main" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "sha=${RUN_SHA}" >> "$GITHUB_OUTPUT"
            echo "branch=${RUN_BRANCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify release_gate succeeded on target SHA
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const sha = '${{ steps.target.outputs.sha }}';
            const { data } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              filter: 'all'
            });

            const gateRuns = data.check_runs
              .filter((run) => run.name === 'release_gate')
              .sort((a, b) => new Date(b.started_at) - new Date(a.started_at));

            const latest = gateRuns[0];

            if (!latest || latest.conclusion !== 'success') {
              core.setFailed(
                `Latest release_gate on ${sha} must succeed before merge (found: ${latest?.conclusion ?? 'missing'}).`
              );
              return;
            }

            core.info(`Latest release_gate succeeded on ${sha}: ${latest.details_url}`);

      - name: Find and merge release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ steps.target.outputs.branch }}
          HEAD_SHA: ${{ steps.target.outputs.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          pr_json=$(gh pr list \
            --head "$HEAD_BRANCH" \
            --state open \
            --json number,title,labels,headRefOid \
            -R "$REPOSITORY")

          count=$(echo "$pr_json" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "No open PR for head branch $HEAD_BRANCH — already merged or closed."
            exit 0
          fi

          pr_number=$(echo "$pr_json" | jq -r '.[0].number')
          title=$(echo "$pr_json" | jq -r '.[0].title')
          head_oid=$(echo "$pr_json" | jq -r '.[0].headRefOid')
          labels=$(echo "$pr_json" | jq -r '.[0].labels[].name' | tr '\n' ' ')

          if [ "$head_oid" != "$HEAD_SHA" ]; then
            echo "PR #$pr_number head ($head_oid) does not match target SHA ($HEAD_SHA) — skipping stale run."
            exit 0
          fi

          # release-please's default linked-versions title is `chore: release main`
          # (no scope); accept that and an optional `chore(<scope>): release ...`.
          # Regex held in a var (shellcheck-friendly for the optional group).
          release_title_re='^chore(\([^)]*\))?: release '
          if [[ ! "$title" =~ $release_title_re ]]; then
            echo "PR #$pr_number title does not match release PR pattern: $title"
            exit 1
          fi

          if ! grep -q 'autorelease: pending' <<<"$labels"; then
            echo "PR #$pr_number missing autorelease: pending label — skipping."
            exit 0
          fi

          latest_release_gate() {
            gh api "repos/${REPOSITORY}/commits/${HEAD_SHA}/check-runs" \
              --jq '[.check_runs[] | select(.name == "release_gate")] | sort_by(.started_at) | last | .conclusion // "missing"'
          }

          echo "Merging release PR #$pr_number ($title)"
          for attempt in $(seq 1 12); do
            conclusion=$(latest_release_gate)
            if [ "$conclusion" != "success" ]; then
              echo "Latest release_gate on $HEAD_SHA is $conclusion (attempt ${attempt}/12); waiting 30s..."
              sleep 30
              continue
            fi

            if gh pr merge "$pr_number" --squash -R "$REPOSITORY"; then
              echo "Merged PR #$pr_number"
              merge_sha=$(gh pr view "$pr_number" --json mergeCommit -q '.mergeCommit.oid' -R "$REPOSITORY")
              echo "merge_sha=${merge_sha}" >> "$GITHUB_ENV"
              echo "merged=true" >> "$GITHUB_ENV"
              exit 0
            fi

            if gh pr merge "$pr_number" --squash --admin -R "$REPOSITORY"; then
              echo "Merged PR #$pr_number with admin override"
              merge_sha=$(gh pr view "$pr_number" --json mergeCommit -q '.mergeCommit.oid' -R "$REPOSITORY")
              echo "merge_sha=${merge_sha}" >> "$GITHUB_ENV"
              echo "merged=true" >> "$GITHUB_ENV"
              exit 0
            fi

            echo "Merge blocked (attempt ${attempt}/12); waiting for branch protection to catch up..."
            sleep 30
          done

          echo "Failed to merge PR #$pr_number after 12 attempts"
          exit 1

      - name: Bootstrap CI on merge commit
        if: env.merged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ci.yml --ref main -R "${{ github.repository }}"
          echo "Dispatched CI on main at merge commit ${{ env.merge_sha }}."

      - name: Trigger release-please after merge
        if: env.merged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release-please.yml -R "${{ github.repository }}"
          echo "Dispatched release-please for tag + publish-hex handoff."
