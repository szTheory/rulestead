services:
  postgres:
    image: postgres:15
    container_name: rulestead-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rulestead_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rulestead_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
