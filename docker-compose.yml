# Static project name so a bare `docker compose up` is deterministically
# namespaced (rulestead-backend-1, its own network/volumes) and can never
# clobber a sibling demo's containers. `scripts/demo/up.sh` overrides this via
# COMPOSE_PROJECT_NAME (env var wins over `name:`) for per-branch isolation.
name: rulestead

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rulestead_demo_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rulestead_demo_dev"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: examples/demo/backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MIX_ENV: prod
      PHX_SERVER: "true"
      PORT: "4000"
      PHX_HOST: localhost
      SECRET_KEY_BASE: 8HzqV6u8Ly1k2QjGgYoJ4M3l9pZcWQX0U2A3b8C7d6E5f4G3h2J1k0LmNpQrStUv
      DATABASE_URL: ecto://postgres:postgres@postgres:5432/rulestead_demo_dev
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_DB: rulestead_demo_dev
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RULESTEAD_REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:${DEMO_BACKEND_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4000/ >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: examples/demo/frontend/Dockerfile
      args:
        NEXT_PUBLIC_FLAGS_API_BASE: ${NEXT_PUBLIC_FLAGS_API_BASE:-http://localhost:4000}
        NEXT_PUBLIC_FLAGS_ENVIRONMENT_KEY: staging
        NEXT_PUBLIC_FLAGS_TARGETING_KEY: demo-user
    depends_on:
      backend:
        condition: service_healthy
    environment:
      FLAGS_API_BASE: http://backend:4000
      NEXT_PUBLIC_FLAGS_API_BASE: ${NEXT_PUBLIC_FLAGS_API_BASE:-http://localhost:4000}
      NEXT_PUBLIC_FLAGS_ENVIRONMENT_KEY: staging
      NEXT_PUBLIC_FLAGS_TARGETING_KEY: demo-user
    ports:
      - "127.0.0.1:${DEMO_FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
