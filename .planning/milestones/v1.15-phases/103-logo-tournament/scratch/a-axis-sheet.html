<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Axis A scratch sheet — Phase 103</title>
<!-- THROWAWAY scratch render sheet for Axis A candidates. Not a deliverable. -->
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #ffffff; color: #1a2332; font-family: system-ui, sans-serif; }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 28px; }
  h1 { font-size: 1.1rem; margin: 0 0 18px; }
  .cand { border: 1px solid rgba(0,0,0,0.12); border-radius: 10px; padding: 22px 26px; margin-bottom: 26px; background: #fff; }
  .cand h2 { font-size: 0.85rem; font-weight: 600; color: #5c6b7a; margin: 0 0 14px; letter-spacing: 0.04em; }
  .big img { width: 480px; display: block; }
  .squint { margin-top: 18px; padding-top: 14px; border-top: 1px dashed rgba(0,0,0,0.15); display: flex; align-items: center; gap: 28px; }
  .squint img { height: 36px; display: block; }
  .squint .tag { font-size: 0.7rem; color: #8a97a3; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Phase 103 — Axis A scratch sheet (480px on white + 36px squint row)</h1>

  <div class="cand">
    <h2>A1 — branch grows out of the R leg</h2>
    <div class="big"><img src="../candidates/a1.svg" alt="a1"></div>
    <div class="squint"><img src="../candidates/a1.svg" alt="a1 small"><span class="tag">36px</span></div>
  </div>

  <div class="cand">
    <h2>A2 — routing junction carved into the d counter</h2>
    <div class="big"><img src="../candidates/a2.svg" alt="a2"></div>
    <div class="squint"><img src="../candidates/a2.svg" alt="a2 small"><span class="tag">36px</span></div>
  </div>

  <div class="cand">
    <h2>A3 — route threads the baseline</h2>
    <div class="big"><img src="../candidates/a3.svg" alt="a3"></div>
    <div class="squint"><img src="../candidates/a3.svg" alt="a3 small"><span class="tag">36px</span></div>
  </div>
</div>
</body>
</html>
